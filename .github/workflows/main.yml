name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-web:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run --cwd apps/web lint

  lint-api:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run --cwd apps/api tsc --noEmit

  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    needs: [lint-web, lint-api]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create .env file
        working-directory: ./apps/web
        run: |
          cat <<EOF > .env.production
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_PUBLIC_URL=${{ secrets.NEXT_PUBLIC_PUBLIC_URL }}
          NEXT_PUBLIC_SITE_NAME=${{ secrets.NEXT_PUBLIC_SITE_NAME }}
          NEXT_PUBLIC_TURNSTILE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_KEY }}
          NEXT_PUBLIC_ADSENSE_PUBLISHER_ID=${{ secrets.NEXT_PUBLIC_ADSENSE_PUBLISHER_ID }}
          NEXT_PUBLIC_GTM_ID=${{ secrets.NEXT_PUBLIC_GTM_ID }}
          NEXT_PUBLIC_COOKIEBOT_API_KEY=${{ secrets.NEXT_PUBLIC_COOKIEBOT_API_KEY }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          NEXT_PUBLIC_PRIVACY_ADMIN_FULL_NAME=${{ secrets.NEXT_PUBLIC_PRIVACY_ADMIN_FULL_NAME }}
          NEXT_PUBLIC_PRIVACY_CONTACT_EMAIL=${{ secrets.NEXT_PUBLIC_PRIVACY_CONTACT_EMAIL }}
          NEXT_PUBLIC_PRIVACY_SITE_URL=${{ secrets.NEXT_PUBLIC_PRIVACY_SITE_URL }}
          NEXT_PUBLIC_MAP_TILE_STYLES_URL=${{ secrets.NEXT_PUBLIC_MAP_TILE_STYLES_URL }}
          EOF

      - name: Build web
        working-directory: ./apps/web
        run: bun run build

      - name: Archive monorepo
        run: |
          tar -czf deploy.tar.gz \
            package.json bun.lock \
            apps/api/src apps/api/drizzle apps/api/package.json apps/api/tsconfig.json apps/api/bun.lock apps/api/drizzle.config.ts \
            apps/web/.next apps/web/public apps/web/package.json apps/web/next.config.mjs

      - name: Upload archive to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          echo "$SSH_PRIVATE_KEY" > private_key
          chmod 600 private_key

          scp -i private_key -o StrictHostKeyChecking=no deploy.tar.gz $VPS_USER@$VPS_HOST:/home/mz-prod/deploy.tar.gz

      - name: Deploy and restart services
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          echo "$SSH_PRIVATE_KEY" > private_key
          chmod 600 private_key

          ssh -i private_key -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST << 'EOF'
            cd /home/mz-prod

            # Stop services
            screen -S api -X stuff "^C"
            screen -S web -X stuff "^C"
            sleep 1

            # Clean old files
            rm -rf apps node_modules package.json bun.lock

            # Extract monorepo
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            # Install all dependencies
            bun install --production

            # Copy env file for API
            cp /home/.env /home/mz-prod/apps/api/

            # Restart API
            screen -S api -X stuff "clear\n"
            screen -S api -X stuff "cd /home/mz-prod && bun run --cwd apps/api start\n"

            # Restart Web
            screen -S web -X stuff "clear\n"
            screen -S web -X stuff "cd /home/mz-prod && bun run --cwd apps/web start\n"
          EOF
